<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UDABOL NEON CHAT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

padding:15px;

background:
radial-gradient(circle at top left,#00ffff22,transparent 35%),
radial-gradient(circle at bottom right,#ff00ff22,transparent 35%),
#050816;
}

.chat-container{

width:100%;
max-width:500px;

height:90vh;

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border-radius:25px;

border:1px solid rgba(255,255,255,.1);

overflow:hidden;

display:flex;
flex-direction:column;

box-shadow:
0 0 20px #00ffff55,
0 0 40px #ff00ff33;
}

.header{

padding:18px;

text-align:center;

font-size:22px;
font-weight:bold;

color:white;

background:
linear-gradient(
90deg,
#00ffff,
#8b5cf6,
#ff00ff
);
}

.online{

padding:8px;

text-align:center;

background:#0f172a;

color:#00ffff;

font-weight:bold;
}

.login{

padding:12px;

display:flex;

gap:10px;

background:#0f172a;
}

.login input{

flex:1;
}

.chat{

flex:1;

overflow-y:auto;

padding:15px;

display:flex;
flex-direction:column;

gap:10px;
}

.message{

max-width:80%;

padding:12px;

border-radius:15px;

background:
rgba(255,255,255,.08);

color:white;

word-break:break-word;

animation:show .2s ease;
}

.message.own{

align-self:flex-end;

background:
linear-gradient(
135deg,
#ff00ff,
#8b5cf6
);
}

.user{

font-size:11px;

font-weight:bold;

color:#00ffff;

margin-bottom:5px;
}

.time{

font-size:10px;

opacity:.7;

margin-top:5px;
}

.input-area{

padding:12px;

display:flex;

gap:10px;

background:#0f172a;
}

input{

flex:1;

padding:12px;

border:none;

outline:none;

border-radius:12px;

background:
rgba(255,255,255,.08);

color:white;
}

button{

padding:12px 16px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

background:
linear-gradient(
135deg,
#00ffff,
#ff00ff
);

color:white;
}

button:hover{

transform:scale(1.03);
}

.chat::-webkit-scrollbar{

width:6px;
}

.chat::-webkit-scrollbar-thumb{

background:#00ffff;
border-radius:10px;
}

@keyframes show{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

.chat-container{

max-width:100%;
height:95vh;
}

.header{

font-size:20px;
}
}

@media(max-width:480px){

body{
padding:0;
}

.chat-container{

height:100vh;
border-radius:0;
}

.header{

font-size:18px;
}

.message{

max-width:95%;
}
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
⚡ UDABOL CHAT ⚡
</div>

<div id="onlineUsers" class="online">
🟢 Usuarios conectados: 0
</div>

<div class="login">

<input
type="text"
id="nombre"
placeholder="Tu nombre">

<button onclick="guardarNombre()">
Entrar
</button>

</div>

<div id="chat" class="chat"></div>

<div class="input-area">

<input
type="text"
id="mensaje"
placeholder="Escribe un mensaje...">

<button onclick="enviar()">
➤
</button>

</div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io();

let nombre = "";

function guardarNombre(){

let n =
document.getElementById("nombre").value.trim();

if(n===""){

alert("Ingresa tu nombre");
return;
}

nombre = n;

document.querySelector(".login")
.style.display="none";
}

function enviar(){

if(nombre===""){

alert("Primero ingresa tu nombre");
return;
}

let input =
document.getElementById("mensaje");

let texto =
input.value.trim();

if(texto===""){
return;
}

const data = {

user:nombre,

text:texto,

time:new Date().toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
})

};

socket.send(
JSON.stringify(data)
);

input.value="";
}

document
.getElementById("mensaje")
.addEventListener("keypress",e=>{

if(e.key==="Enter"){

enviar();

}

});

fetch("/historial")
.then(res => res.json())
.then(datos => {

datos.forEach(data => {

const div =
document.createElement("div");

div.className = "message";

div.innerHTML = `
<div class="user">${data.user}</div>
<div>${data.text}</div>
<div class="time">${data.time}</div>
`;

document
.getElementById("chat")
.appendChild(div);

});

});

socket.on("message",msg=>{

let data;

try{

data = JSON.parse(msg);

}catch{

return;

}

const div =
document.createElement("div");

div.className="message";

if(data.user===nombre){

div.classList.add("own");

}

div.innerHTML=`

<div class="user">
${data.user}
</div>

<div>
${data.text}
</div>

<div class="time">
${data.time}
</div>

`;

document
.getElementById("chat")
.appendChild(div);

document
.getElementById("chat")
.scrollTop=
document
.getElementById("chat")
.scrollHeight;

});

socket.on("usuarios", function(cantidad){

document.getElementById("onlineUsers").innerHTML =
"🟢 Usuarios conectados: " + cantidad;

});

</script>

</body>
</html>
