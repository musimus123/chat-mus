<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WolfTrónica Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{

height:100vh;

background:
linear-gradient(
135deg,
#021124,
#041f3f,
#062a4f
);

display:flex;
justify-content:center;
align-items:center;
}

#welcome{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:
linear-gradient(
135deg,
#021124,
#062a4f
);

display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}

.welcome-box{

width:90%;
max-width:450px;

background:#0b1730;

padding:30px;

border-radius:25px;

text-align:center;

box-shadow:
0 0 25px #00d4ff55;
}

.welcome-box img{

width:180px;
margin-bottom:20px;
}

.welcome-box h1{

color:#00d4ff;
margin-bottom:15px;
}

.welcome-box p{

color:#ddd;
margin-bottom:20px;
}

.welcome-box input{

width:100%;
padding:15px;

border:none;
outline:none;

border-radius:15px;

margin-bottom:15px;
}

.welcome-box button{

width:100%;

padding:15px;

border:none;

border-radius:15px;

cursor:pointer;

font-weight:bold;

background:#00d4ff;
color:black;
}

.chat-container{

width:100%;
max-width:550px;

height:95vh;

background:#0b1730;

display:flex;
flex-direction:column;

border-radius:25px;

overflow:hidden;

box-shadow:
0 0 30px #00d4ff44;
}

.header{

padding:15px;

background:#081425;

text-align:center;
}

.header img{

width:80px;
}

.header h2{

color:#00d4ff;
margin-top:5px;
}

.online{

padding:10px;

background:#102040;

text-align:center;

color:#00d4ff;
font-weight:bold;
}

.chat{

flex:1;

overflow-y:auto;

padding:15px;

display:flex;
flex-direction:column;

gap:10px;
}

.message{

padding:12px;

border-radius:15px;

background:#122545;

max-width:80%;

color:white;
}

.own{

margin-left:auto;

background:#00d4ff;

color:black;
}

.user{

font-size:12px;
font-weight:bold;
}

.time{

font-size:10px;
opacity:.7;
margin-top:5px;
}

.input-area{

padding:10px;

display:flex;

gap:10px;

background:#081425;
}

.input-area input{

flex:1;

padding:12px;

border:none;

border-radius:12px;
}

.input-area button{

padding:12px 20px;

border:none;

border-radius:12px;

background:#00d4ff;

cursor:pointer;
font-weight:bold;
}

@media(max-width:600px){

.chat-container{

height:100vh;
border-radius:0;
}

}

</style>

</head>

<body>

<div id="welcome">

<div class="welcome-box">

<img src="/static/logo.jpg">

<h1>WolfTrónica Chat</h1>

<p>Ingresa tu nombre para acceder</p>

<input
type="text"
id="nombre">

<button onclick="entrar()">

Ingresar

</button>

</div>

</div>

<div class="chat-container">

<div class="header">

<img src="/static/logo.jpg">

<h2>WolfTrónica</h2>

</div>

<div id="onlineUsers" class="online">

🟢 Usuarios conectados: 0

</div>

<div id="typing" style="
height:25px;
padding:5px;
text-align:center;
color:#00d4ff;
font-size:12px;
">
</div>

<div id="chat" class="chat">

</div>

<div class="input-area">

<input
id="mensaje"
type="text"
placeholder="Escribe un mensaje...">

<button onclick="enviar()">

Enviar

</button>

</div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io();

let nombre="";

function entrar(){

let n=
document.getElementById("nombre").value.trim();

if(n===""){

alert("Ingresa tu nombre");
return;

}

nombre=n;

socket.emit(
    "usuario_conectado",
    nombre
);

document.getElementById("welcome")
.style.display="none";

}

function enviar(){

if(nombre==="") return;

let texto=
document.getElementById("mensaje").value.trim();

if(texto==="") return;

const data={

user:nombre,

text:texto,

time:new Date().toLocaleTimeString()

};

socket.send(JSON.stringify(data));

document.getElementById("mensaje").value="";

}

document
.getElementById("mensaje")
.addEventListener("keypress",e=>{

if(nombre!==""){

socket.emit(
"escribiendo",
nombre
);

}

if(e.key==="Enter"){

enviar();

}

});

fetch("/historial")
.then(r=>r.json())
.then(datos=>{

datos.forEach(data=>{

agregarMensaje(data);

});

});

socket.on("message", function(msg){

let data;

if(typeof msg === "string"){

    data = JSON.parse(msg);

}else{

    data = msg;

}

agregarMensaje(data);

});

socket.on(
"mensaje_sistema",
function(data){

const div =
document.createElement("div");

div.style.textAlign="center";
div.style.color="#00d4ff";
div.style.fontSize="12px";
div.style.margin="5px";

div.innerHTML =
data.text;

document
.getElementById("chat")
.appendChild(div);

});

function agregarMensaje(data){

const div=
document.createElement("div");

div.className="message";

if(data.user===nombre){

div.classList.add("own");

}

div.innerHTML=`

<div class="user">
${data.user}
</div>

<div>
${data.text}
</div>

<div class="time">
${data.time}
</div>

`;

document
.getElementById("chat")
.appendChild(div);

document
.getElementById("chat")
.scrollTop=
document
.getElementById("chat")
.scrollHeight;

}

socket.on("usuarios",function(cantidad){

document.getElementById("onlineUsers")
.innerHTML=
"🟢 Usuarios conectados: " + cantidad;

});

socket.on(
"mensaje_sistema",
function(texto){

const div =
document.createElement("div");

div.style.textAlign="center";
div.style.color="#00d4ff";
div.style.fontSize="12px";
div.style.margin="5px";

div.innerHTML=texto;

document
.getElementById("chat")
.appendChild(div);

});

socket.on(
"nombre_ocupado",
function(){

alert(
"Este nombre ya está conectado"
);

location.reload();

});

socket.on(
"mostrar_escribiendo",
function(usuario){

document.getElementById("typing")
.innerHTML=
usuario + " está escribiendo...";

setTimeout(function(){

document.getElementById("typing")
.innerHTML="";

},1500);

});

</script>

</body>
</html>
