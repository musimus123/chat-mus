<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Administrador</title>

<style>

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#050816;

font-family:Arial;
}

.login{

width:350px;

padding:30px;

background:#111827;

border-radius:20px;

box-shadow:
0 0 20px #00ffff55;
}

h1{

text-align:center;

color:#00ffff;

margin-bottom:20px;
}

input{

width:100%;

padding:12px;

margin-bottom:12px;

border:none;

border-radius:10px;
}

button{

width:100%;

padding:12px;

border:none;

border-radius:10px;

background:#00ffff;

font-weight:bold;

cursor:pointer;
}

</style>

</head>

<body>

<div class="login">

<h1>Admin Login</h1>

<form method="POST">

<input
name="usuario"
placeholder="Usuario">

<input
type="password"
name="password"
placeholder="Contraseña">

<button>
Ingresar
</button>

</form>

</div>

</body>
</html>
